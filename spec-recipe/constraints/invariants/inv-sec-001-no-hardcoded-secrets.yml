id: INV-SEC-001
layer: invariant
name: "하드코딩된 시크릿 금지"
severity: halt
scope:
  files: "**/*.{py,js,ts,java,go,rs,rb,php,sh,yml,yaml,json,toml,env}"
  exclude: ["**/test/**", "**/*_test.*", "**/fixtures/**"]
detection:
  fast:
    method: regex
    patterns:
      - 'password\s*[=:]\s*["\x27][^"\x27]{8,}'
      - 'api[_-]?key\s*[=:]\s*["\x27][A-Za-z0-9]{16,}'
      - 'secret\s*[=:]\s*["\x27][^"\x27]{8,}'
      - 'token\s*[=:]\s*["\x27](?!\{)[^"\x27]{16,}'
      - 'private[_-]?key\s*[=:]\s*["\x27][^"\x27]{16,}'
  normal:
    method: regex
    patterns:
      - 'password\s*[=:]\s*["\x27][^"\x27]{8,}'
      - 'api[_-]?key\s*[=:]\s*["\x27][A-Za-z0-9]{16,}'
      - 'secret\s*[=:]\s*["\x27][^"\x27]{8,}'
      - 'token\s*[=:]\s*["\x27](?!\{)[^"\x27]{16,}'
      - 'private[_-]?key\s*[=:]\s*["\x27][^"\x27]{16,}'
      - 'AWS[_-]?ACCESS[_-]?KEY[_-]?ID\s*[=:]\s*["\x27]?AK[A-Z0-9]{18}'
      - 'AKIA[A-Z0-9]{16}'
  deep:
    method: tool
    tool: "detect-secrets"
    config: ".detect-secrets.baseline"
remediation: |
  시크릿은 환경변수 또는 시크릿 매니저를 통해 주입해야 한다.
  - 환경변수: os.environ['API_KEY'] (Python), process.env.API_KEY (Node.js)
  - .env 파일 + .gitignore
  - 시크릿 매니저 (AWS Secrets Manager, HashiCorp Vault 등)
tags: [security, secrets]
ref: "OWASP-A07:2021"
