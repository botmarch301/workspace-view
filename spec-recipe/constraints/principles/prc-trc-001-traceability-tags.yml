id: PRC-TRC-001
layer: principle
name: "추적성 태그 필수"
severity: block
scope:
  files: "src/**"
detection:
  fast:
    method: regex
    patterns:
      - '(?:def |function |class |public |private |protected ).*(?:(?!Implements:).)*$'
  normal:
    method: script
    command: "python3 scripts/verify-traceability.py --check-tags"
remediation: |
  모든 주요 함수/클래스/모듈에 Implements: {SPEC-ID} 태그를 포함해야 한다.
  테스트 코드에는 Covers: {SPEC-ID} 태그를 포함해야 한다.
  태그 문법은 해당 언어의 단일행 주석을 사용한다.
tags: [process, traceability]
ref: "CORE-PRC-001 Section 4"
